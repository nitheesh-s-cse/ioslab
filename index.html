#include <stdlib.h>
#include <string.h>

#include <sys/ipc.h>
#include <sys/shm.h>

#include <stdio.h>
#include <stdlib.h>
#include <sys/types.h>
#include <sys/ipc.h>
#include <sys/shm.h>

#define SHMSIZE 27

int main()
{
    int shmid;
    key_t key = 2013;
    char *shm, *s;

    shmid = shmget(key, SHMSIZE, 0666);
    if (shmid < 0) {
        printf("Server not started\\n");
        exit(1);
    }

    printf("Accessing shared memory id : %d\\n", shmid);

    shm = shmat(shmid, NULL, 0);
    if (shm == (char *) -1) {
        perror("shmat");
        exit(1);
    }

    printf("Shared memory contents:\\n");
    for (s = shm; *s != '\\0'; s++)
        putchar(*s);

    putchar('\\n');
